<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dracula Ürün Listesi</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Kendi CSS dosyam -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="py-4 mb-4">
    <div class="container">
      <h1 class="text-center mb-1">
        Ürün Listesi
      </h1>

      <p class="header-description text-center mb-0">
        API üzerinden alınan ürünleri keşfet
      </p>
    </div>
  </header>

  <main class="container pb-5">

    <!-- Ürünler yüklenirken gösterilecek alan
        ekranda spinner ama ekran okuyucu yükleniyor olarak algılar -->
    <div id="loading" class="text-center py-5">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">
          Yükleniyor...
        </span>
      </div>

      <p class="mt-3 mb-0">
        Ürünler yükleniyor...
      </p>
    </div>

    <!-- Hata oluşursa gösterilecek alan -->
    <div
      id="errorMessage"
      class="alert alert-danger d-none"
      role="alert"
    ></div>

    <!-- Ürün kartları JavaScript tarafından buraya eklenecek -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fs-4 mb-0">Tüm Ürünler</h2>

      <span id="productCount" class="badge product-count-badge">
        0 ürün
      </span>
    </div>

    <div id="productList" class="row g-4"></div>

  </main>

  <!-- Ürün detay modalı -->
  <div
    class="modal fade"
    id="productModal"
    tabindex="-1"
    aria-labelledby="productModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h2
            class="modal-title fs-5"
            id="productModalLabel"
          >
            Ürün Detayı
          </h2>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Kapat"
          ></button>
        </div>

        <div
          class="modal-body"
          id="modalBody"
        >
          Ürün bilgileri yükleniyor...
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JavaScript -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  ></script>

  <!-- Kendi JavaScript dosyam -->
  <script src="script.js"></script>

</body>
</html>
